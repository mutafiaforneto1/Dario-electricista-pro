name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - name: Compilar APK
      uses: ArtemSBulgakov/buildozer-action@v1
      with:
        command: buildozer android debug
        workdir: electroapp
    - name: Subir APK
      uses: actions/upload-artifact@v4
      with:
        name: DarioElectricista-APK
        path: electroapp/bin/*.apk
        retention-days: 30
