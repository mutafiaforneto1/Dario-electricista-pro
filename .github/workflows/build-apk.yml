name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Cache buildozer
      uses: actions/cache@v3
      with:
        path: |
          ~/.buildozer
          ~/.gradle
        key: buildozer-${{ hashFiles('electroapp/buildozer.spec') }}
    - name: Dependencias
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev cmake libffi-dev libssl-dev
        pip install --upgrade buildozer cython==0.29.37
    - name: Compilar
      working-directory: electroapp
      timeout-minutes: 60
      run: buildozer android debug
    - name: Subir APK
      uses: actions/upload-artifact@v3
      with:
        name: DarioElectricista-APK
        path: electroapp/bin/*.apk
        retention-days: 30
