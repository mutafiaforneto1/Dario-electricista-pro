name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Dependencias
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev cmake libffi-dev libssl-dev
        pip install buildozer cython==0.29.37
    - name: Cache
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: buildozer-${{ hashFiles('electroapp/buildozer.spec') }}
    - name: Compilar
      working-directory: electroapp
      run: buildozer -v android debug 2>&1 | tail -50
    - name: Subir APK
      uses: actions/upload-artifact@v4
      with:
        name: DarioElectricista-APK
        path: electroapp/bin/*.apk
        retention-days: 30
    - name: Release
      if: success()
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: "Dario Electricista v${{ github.run_number }}"
        files: electroapp/bin/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
